<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Panel Studio — 演播厅原型</title>

<!-- Fonts: Fira Code + Fira Sans (UI UX Pro Max Design System) -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600;700&family=Fira+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
/* ============================================================
   CSS Custom Properties — AI Panel Studio Design System
   Source: UI UX Pro Max v2.5 + PRD v1.0
   ============================================================ */
:root {
  /* ---------- Palette: Dark Mode OLED ---------- */
  --color-bg:          #020617;
  --color-bg-elevated: #0F172A;
  --color-bg-card:     #1E293B;
  --color-bg-hover:    #1A1E2F;
  --color-border:      #334155;
  --color-border-light:#2A2D3E;
  --color-fg:          #F8FAFC;
  --color-fg-muted:    #94A3B8;
  --color-fg-dim:      #64748B;

  /* ---------- Accent ---------- */
  --color-accent:      #22C55E;
  --color-accent-dim:  #16A34A;
  --color-destructive: #EF4444;
  --color-warning:     #FB923C;
  --color-info:        #3B82F6;

  /* ---------- Panel Member Colors ---------- */
  --member-1: #6366F1;   /* 主持人 — 靛蓝 */
  --member-2: #EF4444;   /* 专家 A — 红色 */
  --member-3: #3B82F6;   /* 专家 B — 蓝色 */
  --member-4: #F59E0B;   /* 专家 C — 琥珀 */
  --member-5: #10B981;   /* 专家 D — 翠绿 */

  /* ---------- Consensus / Disagreement ---------- */
  --color-consensus:     #34D399;
  --color-consensus-bg:  rgba(52, 211, 153, 0.10);
  --color-disagreement:  #FB923C;
  --color-disagreement-bg:rgba(251, 146, 60, 0.10);

  /* ---------- Status ---------- */
  --status-idle:      #64748B;
  --status-preparing: #F59E0B;
  --status-speaking:  #3B82F6;

  /* ---------- Typography ---------- */
  --font-heading: 'Fira Code', 'Cascadia Code', monospace;
  --font-body:    'Fira Sans', system-ui, -apple-system, sans-serif;

  /* ---------- Spacing ---------- */
  --radius-sm: 6px;
  --radius-md: 10px;
  --radius-lg: 16px;

  /* ---------- Z-Index Scale ---------- */
  --z-background: -1;
  --z-base:       0;
  --z-dropdown:   20;
  --z-sticky:     30;
  --z-overlay:    40;
  --z-modal:      50;

  /* ---------- Effects ---------- */
  --glow-accent: 0 0 12px rgba(34, 197, 94, 0.15);
  --glow-text:   0 0 10px rgba(248, 250, 252, 0.6);
}

/* ============================================================
   Reset & Base
   ============================================================ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  font-family: var(--font-body);
  font-size: 15px;
  line-height: 1.6;
  color: var(--color-fg);
  background: var(--color-bg);
  overflow: hidden;
}

/* Scrollbar — studio aesthetic */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--color-border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--color-fg-dim); }

/* ============================================================
   App Shell
   ============================================================ */
.app {
  display: flex;
  flex-direction: column;
  height: 100vh;
  overflow: hidden;
}

/* ---------- Top Bar ---------- */
.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 20px;
  background: var(--color-bg-elevated);
  border-bottom: 1px solid var(--color-border);
  z-index: var(--z-sticky);
  gap: 16px;
  flex-shrink: 0;
}

.topbar__brand {
  display: flex;
  align-items: center;
  gap: 10px;
  font-family: var(--font-heading);
  font-weight: 700;
  font-size: 1.05rem;
  letter-spacing: -0.02em;
  white-space: nowrap;
}

.topbar__brand-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  background: var(--color-accent);
  box-shadow: var(--glow-accent);
  animation: pulse-dot 2s ease-in-out infinite;
}

@keyframes pulse-dot {
  0%, 100% { opacity: 1; transform: scale(1); }
  50%      { opacity: 0.5; transform: scale(1.3); }
}

.topbar__topic {
  font-size: 0.95rem;
  color: var(--color-fg-muted);
  flex: 1;
  text-align: center;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.topbar__status {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 0.8rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
}

.topbar__status-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--color-accent);
  animation: pulse-dot 2s ease-in-out infinite;
}

.topbar__status-dot--paused {
  background: var(--color-warning);
  animation: none;
}

/* ---------- Control Bar ---------- */
.controlbar {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  padding: 8px 20px;
  background: var(--color-bg-elevated);
  border-top: 1px solid var(--color-border);
  z-index: var(--z-sticky);
  flex-shrink: 0;
}

.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 18px;
  border: 1px solid var(--color-border);
  border-radius: var(--radius-sm);
  background: var(--color-bg-card);
  color: var(--color-fg);
  font-family: var(--font-body);
  font-size: 0.85rem;
  font-weight: 500;
  cursor: pointer;
  transition: all 200ms ease;
  user-select: none;
  white-space: nowrap;
}

.btn:hover {
  background: var(--color-bg-hover);
  border-color: var(--color-fg-dim);
}

.btn:focus-visible {
  outline: 2px solid var(--color-accent);
  outline-offset: 2px;
}

.btn:active {
  transform: scale(0.97);
}

.btn--primary {
  background: var(--color-accent);
  border-color: var(--color-accent);
  color: #000;
  font-weight: 600;
}
.btn--primary:hover {
  background: var(--color-accent-dim);
  border-color: var(--color-accent-dim);
}

.btn--danger {
  border-color: var(--color-destructive);
  color: var(--color-destructive);
}
.btn--danger:hover {
  background: var(--color-destructive);
  color: #fff;
}

.btn--sm { padding: 5px 12px; font-size: 0.78rem; }

/* ============================================================
   Main Studio Grid — Responsive Three-Column
   ============================================================ */
.studio {
  display: grid;
  grid-template-columns: 280px 1fr 320px;
  flex: 1;
  overflow: hidden;
  gap: 0;
}

/* Each panel independently scrollable */
.panel {
  display: flex;
  flex-direction: column;
  overflow-y: auto;
  overflow-x: hidden;
  border-right: 1px solid var(--color-border);
}

.panel:last-child { border-right: none; }

.panel__header {
  position: sticky;
  top: 0;
  z-index: var(--z-sticky);
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 14px 16px;
  background: var(--color-bg-elevated);
  border-bottom: 1px solid var(--color-border);
  font-family: var(--font-heading);
  font-size: 0.85rem;
  font-weight: 600;
  letter-spacing: 0.05em;
  text-transform: uppercase;
}

.panel__header-icon {
  width: 16px; height: 16px;
  opacity: 0.7;
}

.panel__body {
  padding: 12px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

/* ============================================================
   Left Panel — Expert Status Cards
   ============================================================ */
.expert-card {
  background: var(--color-bg-card);
  border: 1px solid var(--color-border-light);
  border-radius: var(--radius-md);
  padding: 14px;
  transition: all 250ms ease;
  cursor: pointer;
  position: relative;
  overflow: hidden;
}

.expert-card:hover {
  border-color: var(--color-fg-dim);
  background: var(--color-bg-hover);
}

.expert-card::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
  border-radius: 0 3px 3px 0;
  transition: width 250ms ease;
}

.expert-card--speaking::before {
  width: 5px;
  animation: glow-bar 1s ease-in-out infinite alternate;
}

@keyframes glow-bar {
  from { box-shadow: 0 0 6px var(--member-color, var(--color-accent)); }
  to   { box-shadow: 0 0 16px var(--member-color, var(--color-accent)); }
}

.expert-card__header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 8px;
}

.expert-card__avatar {
  width: 38px; height: 38px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-heading);
  font-weight: 700;
  font-size: 0.9rem;
  color: #fff;
  flex-shrink: 0;
}

.expert-card__info {
  flex: 1;
  min-width: 0;
}

.expert-card__name {
  font-weight: 600;
  font-size: 0.92rem;
  line-height: 1.2;
}

.expert-card__title-line {
  font-size: 0.72rem;
  color: var(--color-fg-muted);
  line-height: 1.3;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.expert-card__stance {
  margin-top: 6px;
  font-size: 0.74rem;
  color: var(--color-fg-dim);
  font-style: italic;
  line-height: 1.4;
}

/* Status badge */
.status-badge {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 3px 10px;
  border-radius: 20px;
  font-size: 0.68rem;
  font-weight: 600;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  margin-top: 8px;
}

.status-badge--idle      { background: rgba(100,116,139,0.15); color: var(--status-idle); }
.status-badge--preparing { background: rgba(245,158,11,0.15); color: var(--status-preparing); animation: pulse-badge 0.8s ease-in-out infinite; }
.status-badge--speaking  { background: rgba(59,130,246,0.15); color: var(--status-speaking); animation: pulse-badge 0.5s ease-in-out infinite; }

@keyframes pulse-badge {
  0%, 100% { opacity: 1; }
  50%      { opacity: 0.6; }
}

.status-badge__dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: currentColor;
}

/* Focus summary */
.expert-card__focus {
  margin-top: 8px;
  padding: 8px 10px;
  background: rgba(255,255,255,0.03);
  border-radius: var(--radius-sm);
  font-size: 0.73rem;
  color: var(--color-fg-muted);
  line-height: 1.5;
  border-left: 2px solid var(--color-border);
}

/* Desire meter */
.desire-meter {
  margin-top: 6px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.desire-meter__bar {
  flex: 1;
  height: 3px;
  background: var(--color-border);
  border-radius: 2px;
  overflow: hidden;
}

.desire-meter__fill {
  height: 100%;
  border-radius: 2px;
  background: var(--member-color, var(--color-accent));
  transition: width 400ms ease;
}

.desire-meter__value {
  font-family: var(--font-heading);
  font-size: 0.68rem;
  color: var(--color-fg-dim);
  min-width: 32px;
  text-align: right;
}

/* ============================================================
   Center Panel — Transcript
   ============================================================ */
.transcript-list {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.utterance {
  display: flex;
  gap: 12px;
  padding: 14px 16px;
  border-radius: var(--radius-sm);
  transition: background 200ms ease;
  animation: fadeInUp 0.35s ease-out;
}

@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}

.utterance:hover {
  background: rgba(255,255,255,0.02);
}

.utterance__marker {
  width: 3px;
  border-radius: 2px;
  flex-shrink: 0;
  align-self: stretch;
}

.utterance__body {
  flex: 1;
  min-width: 0;
}

.utterance__speaker {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 4px;
}

.utterance__speaker-name {
  font-weight: 600;
  font-size: 0.85rem;
}

.utterance__speaker-title {
  font-size: 0.7rem;
  color: var(--color-fg-dim);
}

.utterance__type {
  font-size: 0.65rem;
  font-weight: 600;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  padding: 1px 7px;
  border-radius: 3px;
  background: rgba(255,255,255,0.05);
  color: var(--color-fg-dim);
}

.utterance__content {
  font-size: 0.9rem;
  line-height: 1.75;
  color: var(--color-fg);
}

.utterance__time {
  font-size: 0.65rem;
  color: var(--color-fg-dim);
  margin-top: 6px;
  font-family: var(--font-heading);
}

/* Streaming text cursor */
.streaming-cursor::after {
  content: '▍';
  animation: blink 1s step-end infinite;
  color: var(--color-accent);
}

@keyframes blink {
  0%, 100% { opacity: 1; }
  50%      { opacity: 0; }
}

/* Speaker type accent */
.utterance--opening   .utterance__marker { background: var(--member-1); }
.utterance--statement .utterance__marker { background: var(--member-2); }
.utterance--rebuttal  .utterance__marker { background: var(--member-4); }
.utterance--question  .utterance__marker { background: var(--member-1); }
.utterance--summary   { border: 1px solid var(--color-accent); border-radius: var(--radius-md); }

/* ============================================================
   Right Panel — Consensus & Disagreement
   ============================================================ */
.consensus-item {
  background: var(--color-bg-card);
  border: 1px solid var(--color-border-light);
  border-radius: var(--radius-md);
  padding: 14px;
  animation: fadeInUp 0.35s ease-out;
  cursor: pointer;
  transition: all 200ms ease;
}

.consensus-item:hover {
  border-color: var(--color-fg-dim);
}

.consensus-item__header {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 8px;
}

.consensus-item__type-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 0.65rem;
  font-weight: 700;
  letter-spacing: 0.06em;
  text-transform: uppercase;
}

.consensus-item__type-badge--consensus {
  background: var(--color-consensus-bg);
  color: var(--color-consensus);
}

.consensus-item__type-badge--disagreement {
  background: var(--color-disagreement-bg);
  color: var(--color-disagreement);
}

.consensus-item__title {
  font-weight: 600;
  font-size: 0.88rem;
  line-height: 1.4;
}

.consensus-item__desc {
  font-size: 0.8rem;
  color: var(--color-fg-muted);
  line-height: 1.6;
  margin-top: 6px;
}

.consensus-item__meta {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 10px;
  font-size: 0.68rem;
  color: var(--color-fg-dim);
}

.consensus-item__confidence {
  display: flex;
  align-items: center;
  gap: 4px;
}

.confidence-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
}

.confidence-dot--high { background: var(--color-consensus); }
.confidence-dot--mid  { background: var(--color-warning); }
.confidence-dot--low  { background: var(--color-destructive); }

.consensus-item__resolved {
  padding: 2px 6px;
  border-radius: 3px;
  font-size: 0.62rem;
  font-weight: 700;
  text-transform: uppercase;
  background: var(--color-consensus-bg);
  color: var(--color-consensus);
}

/* Empty state */
.empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 40px 20px;
  text-align: center;
  color: var(--color-fg-dim);
  gap: 8px;
}

.empty-state__icon {
  font-size: 2rem;
  opacity: 0.25;
}

.empty-state__text {
  font-size: 0.85rem;
}

/* ============================================================
   Responsive — Two Column (800-1399px)
   ============================================================ */
@media (max-width: 1399px) {
  .studio {
    grid-template-columns: 1fr 300px;
  }

  /* Move expert panel to top bar area — show as horizontal strip */
  .panel--experts {
    display: none; /* hidden, shown as horizontal row below topbar */
  }

  .expert-strip {
    display: flex;
    gap: 8px;
    padding: 8px 16px;
    background: var(--color-bg-elevated);
    border-bottom: 1px solid var(--color-border);
    overflow-x: auto;
    flex-shrink: 0;
  }

  .expert-strip .expert-card {
    min-width: 180px;
    flex-shrink: 0;
    padding: 10px 12px;
  }

  .expert-strip .expert-card__stance,
  .expert-strip .expert-card__focus,
  .expert-strip .desire-meter { display: none; }

  .expert-strip .expert-card__avatar {
    width: 28px; height: 28px;
    font-size: 0.7rem;
  }
}

@media (min-width: 1400px) {
  .expert-strip { display: none; }
}

/* ============================================================
   Responsive — Single Column (<800px)
   ============================================================ */
@media (max-width: 799px) {
  .studio {
    grid-template-columns: 1fr;
    grid-template-rows: auto 1fr auto;
  }

  .panel--experts, .panel--center, .panel--consensus {
    border-right: none;
    border-bottom: 1px solid var(--color-border);
    max-height: 35vh;
  }

  .panel--consensus { border-bottom: none; }

  .controlbar {
    flex-wrap: wrap;
    gap: 8px;
    padding: 8px 10px;
  }

  .btn { padding: 6px 12px; font-size: 0.78rem; }

  .topbar {
    padding: 8px 12px;
    flex-wrap: wrap;
  }
}
</style>
</head>

<div class="app">

  <!-- ======== Top Bar ======== -->
  <header class="topbar">
    <div class="topbar__brand">
      <span class="topbar__brand-dot"></span>
      AI Panel Studio
    </div>
    <div class="topbar__topic">「AI是否应该具备自我意识？」— 第 3 轮进行中</div>
    <div class="topbar__status">
      <span class="topbar__status-dot"></span>
      直播中
    </div>
  </header>

  <!-- Expert Strip (visible 800-1399px) -->
  <div class="expert-strip" aria-label="嘉宾状态条">
    <!-- Rendered by JS -->
  </div>

  <!-- ======== Main Studio Grid ======== -->
  <main class="studio">

    <!-- ======== Left: Expert Status Panel ======== -->
    <aside class="panel panel--experts" aria-label="嘉宾状态">
      <div class="panel__header">
        <svg class="panel__header-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M6 21v-2a4 4 0 014-4h4a4 4 0 014 4v2"/></svg>
        嘉宾状态
      </div>
      <div class="panel__body" id="expert-panel">
        <!-- Rendered by JS -->
      </div>
    </aside>

    <!-- ======== Center: Transcript ======== -->
    <section class="panel panel--center" aria-label="讨论记录">
      <div class="panel__header">
        <svg class="panel__header-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
        讨论记录
      </div>
      <div class="panel__body" id="transcript-panel">
        <!-- Rendered by JS -->
      </div>
    </section>

    <!-- ======== Right: Consensus & Disagreement ======== -->
    <aside class="panel panel--consensus" aria-label="共识与分歧">
      <div class="panel__header">
        <svg class="panel__header-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/></svg>
        共识与分歧
      </div>
      <div class="panel__body" id="consensus-panel">
        <!-- Rendered by JS -->
      </div>
    </aside>

  </main>

  <!-- ======== Control Bar ======== -->
  <footer class="controlbar">
    <button class="btn" onclick="alert('已暂停')" title="暂停讨论">
      <span>⏸</span> 暂停
    </button>
    <button class="btn btn--primary" onclick="advanceRound()" title="手动推进下一轮">
      <span>▶</span> 下一轮
    </button>
    <button class="btn btn--danger" onclick="alert('讨论已结束')" title="强制结束讨论">
      <span>⏹</span> 结束讨论
    </button>
    <span style="color:var(--color-fg-dim);font-size:0.75rem;margin-left:8px;">
      轮次 3/∞ · 发言 7 条 · 自动模式
    </span>
  </footer>

</div>

     Demo Data & Script
     ============================================================ -->
<script>
// ── Demo Data ──────────────────────────────────────────────
const members = [
  { id:'m1', name:'张明',   title:'AI伦理学家',         role:'host',   stance:'中立客观，引导讨论',        color:'#6366F1', initials:'张' },

// ── Render Functions ───────────────────────────────────────

function renderExpertPanel() {
  const container = document.getElementById('expert-panel');
  const strip = document.querySelector('.expert-strip');

  const html = members.map(m => {
    const s = statuses.find(st => st.member_id === m.id);
    const statusClass = s ? `expert-card--${s.status}` : '';
    const card = `
      <div class="expert-card ${statusClass}" style="--member-color:${m.color}"
           onclick="alert('${m.name} · ${m.title}\\n立场：${m.stance}\\n状态：${s?s.status:'idle'}\\n关注：${s?s.focus:'——'}')">
        <div class="expert-card__header">
          <div class="expert-card__avatar" style="background:${m.color}">${m.initials}</div>
          <div class="expert-card__info">
            <div class="expert-card__name" style="color:${m.color}">${m.name}</div>
            <div class="expert-card__title-line">${m.role === 'host' ? '🎤 ' : ''}${m.title}</div>
          </div>
        </div>
        <div class="expert-card__stance">${m.stance}</div>
        <div class="status-badge status-badge--${s ? s.status : 'idle'}">
          <span class="status-badge__dot"></span>
          ${s ? ({idle:'待机',preparing:'准备发言',speaking:'发言中'}[s.status]) : '待机'}
        </div>
        ${s && s.focus ? `<div class="expert-card__focus">💭 ${s.focus}</div>` : ''}
        <div class="desire-meter">
          <div class="desire-meter__bar">
            <div class="desire-meter__fill" style="width:${(s?s.desire:0)*100}%;background:${m.color}"></div>
          </div>
          <span class="desire-meter__value">${s ? Math.round(s.desire*100) : 0}</span>
        </div>
      </div>`;
    return card;
  }).join('');

  container.innerHTML = html;
  if (strip) strip.innerHTML = html; // mirror for mid-screen
}

function renderTranscript() {
  const container = document.getElementById('transcript-panel');
  const typeLabels = {
    opening:'开场', statement:'发言', rebuttal:'反驳', supplement:'补充', question:'提问', summary:'总结'
  };

  const html = utterances.map(u => {
    const m = members.find(mb => mb.id === u.member_id);
    return `
    <div class="utterance utterance--${u.type}">
      <div class="utterance__marker" style="background:${m?m.color:'#64748B'}"></div>
      <div class="utterance__body">
        <div class="utterance__speaker">
          <span class="utterance__speaker-name" style="color:${m?m.color:'var(--color-fg)'}">${m?m.name:'未知'}</span>
          <span class="utterance__speaker-title">${m?m.title:''}</span>
          <span class="utterance__type">${typeLabels[u.type] || u.type}</span>
        </div>
        <div class="utterance__content">${u.content}</div>
        <div class="utterance__time">${u.time} · #${u.id.slice(0,4)}</div>
      </div>
    </div>`;
  }).join('');

  // Simulate streaming: last utterance with cursor
  const streamingHTML = `
    <div class="utterance utterance--statement">
      <div class="utterance__marker" style="background:#EF4444"></div>
      <div class="utterance__body">
        <div class="utterance__speaker">
          <span class="utterance__speaker-name" style="color:#EF4444">李研究员</span>
          <span class="utterance__speaker-title">认知科学研究所高级研究员</span>
          <span class="utterance__type">发言</span>
        </div>
        <div class="utterance__content streaming-cursor">${'这正是我想进一步阐述的——涌现论的观点在神经科学中有大量支持'}...</div>
        <div class="utterance__time" style="color:var(--color-accent)">● 实时发言中...</div>
      </div>
    </div>`;

  container.innerHTML = html + streamingHTML;

  // Auto-scroll to bottom
  container.scrollTop = container.scrollHeight;
}

function renderConsensus() {
  const container = document.getElementById('consensus-panel');

  if (consensusItems.length === 0) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="empty-state__icon">📋</div>
        <div class="empty-state__text">讨论刚开始，暂无共识或分歧记录</div>
        <div class="empty-state__text" style="font-size:0.7rem;">随讨论进行，此区域将实时更新</div>
      </div>`;
    return;
  }

  const html = consensusItems.map(c => {
    const isConsensus = c.type === 'consensus';
    const confLevel = c.confidence >= 0.8 ? 'high' : c.confidence >= 0.5 ? 'mid' : 'low';
    return `
    <div class="consensus-item">
      <div class="consensus-item__header">
        <span class="consensus-item__type-badge consensus-item__type-badge--${c.type}">
          ${isConsensus ? '✓ 共识' : '⚡ 分歧'}
        </span>
        ${c.resolved ? '<span class="consensus-item__resolved">已化解</span>' : ''}
      </div>
      <div class="consensus-item__title">${c.title}</div>
      <div class="consensus-item__desc">${c.description}</div>
      <div class="consensus-item__meta">
        <span class="consensus-item__confidence">
          置信度
          <span class="confidence-dot confidence-dot--${confLevel}"></span>
          ${Math.round(c.confidence * 100)}%
        </span>
        <span>第 ${c.round} 轮</span>
      </div>
    </div>`;
  }).join('');

  container.innerHTML = html;
}
